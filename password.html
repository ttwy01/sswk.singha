<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>sswk.myluv</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
.clovers{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:2;
}
.clovers span{
    position:absolute;
    top:-80px;
    color:#8BC34A;
    font-size:22px;
    text-shadow:0 0 8px rgba(139,195,74,.4);
    animation:cloverFall 8s linear infinite;
    user-select:none;
}

@keyframes cloverFall{
    0%{
        transform:translateY(-100px) rotate(0deg);
        opacity:0;
    }

    10%{
        opacity:.9;
    }

    50%{
        transform:translateY(50vh) translateX(20px) rotate(180deg);
    }

    100%{
        transform:translateY(110vh) translateX(-25px) rotate(360deg);
        opacity:0;
    }
}
.clovers span:nth-child(1){left:6%; animation-delay:0s;}
.clovers span:nth-child(2){left:18%; animation-delay:2s;}
.clovers span:nth-child(3){left:35%; animation-delay:4s;}
.clovers span:nth-child(4){left:52%; animation-delay:1s;}
.clovers span:nth-child(5){left:70%; animation-delay:5s;}
.clovers span:nth-child(6){left:88%; animation-delay:3s;}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:
linear-gradient(180deg,#ffffff,#f8fbff,#eef7ff);

}

/* แสงพื้นหลัง */

body::before{

content:"";

position:absolute;

width:900px;
height:900px;

background:
radial-gradient(circle,#d9f0ff 0%,transparent 70%);

opacity:.45;

animation:bgMove 12s ease-in-out infinite;

}

@keyframes bgMove{

0%,100%{
transform:translate(-120px,-80px);
}

50%{
transform:translate(120px,60px);
}

}

/* กระดาษ */

.paper{

position:relative;

width:480px;

padding:60px 45px;

background:

linear-gradient(
180deg,
#ffffff,
#fcfcfc
);

border-radius:10px;

box-shadow:
0 25px 50px rgba(0,0,0,.15);

border:1px solid #edf4ff;

overflow:hidden;

animation:paper 3s ease-in-out infinite;

}

/* เส้นกระดาษ */

.paper::before{

content:"";

position:absolute;

left:38px;
top:0;

width:2px;
height:100%;

background:#d7ebff;

}

.paper::after{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:
repeating-linear-gradient(
180deg,
transparent 0px,
transparent 30px,
rgba(180,220,255,.15) 31px
);

pointer-events:none;

}

/* หัว */

.icon{

font-size:46px;

text-align:center;

margin-bottom:12px;

}

h1{

text-align:center;

font-size:32px;

font-weight:600;

color:#6888a8;

margin-bottom:10px;

}

p{

text-align:center;

font-size:18px;

line-height:1.8;

color:#777;

margin-bottom:40px;

}

/* ช่องรหัส */

input{

width:100%;

padding:18px;

font-size:26px;

text-align:center;

letter-spacing:10px;

border-radius:12px;

border:2px solid #d8ecff;

background:#fbfdff;

outline:none;

transition:.35s;

}

input:focus{

border-color:#8acfff;

box-shadow:
0 0 18px rgba(135,200,255,.35);

}

/* ปุ่ม */

button{

margin-top:30px;

width:100%;

padding:16px;

border:none;

border-radius:50px;

background:

linear-gradient(
90deg,
#9bd7ff,
#7fc8ff
);

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-3px);

box-shadow:
0 10px 20px rgba(120,180,255,.4);

}

.error{

margin-top:20px;

text-align:center;

color:#ff6d6d;

}

/* ลอย */

@keyframes paper{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

}

</style>

</head>

<body>

<div class="paper">

<div class="icon">
💌
</div>

<h1>sswk.</h1>

<p>
กรุณาใส่รหัสผ่าน<br>
เพื่อเปิดอ่านข้อความฉบับนี้
</p>

<input
type="password"
maxlength="6"
placeholder="● ● ● ● ● ●"
id="password">

<button onclick="login()">

เปิดจดหมาย

</button>

<div class="error" id="error"></div>

</div>

<script>

function login(){

const pass=document.getElementById("password").value;

if(pass=="240808"){

window.location.href="wish.html";

}else{

document.getElementById("error").innerHTML="วัน/เดือน/ค.ศ.";

}

}
function createLetter(){
    const letter = document.createElement("div");
    letter.className = "bow"; // ใช้ CSS เดิมได้

    const letters = ["🍀"];
    letter.innerHTML = letters[Math.floor(Math.random() * letters.length)];

    letter.style.left = Math.random() * window.innerWidth + "px";
    letter.style.fontSize = (28 + Math.random() * 18) + "px";
    letter.style.animationDuration = (6 + Math.random() * 4) + "s";

    document.getElementById("bows").appendChild(letter);

    setTimeout(() => {
        letter.remove();
    }, 10000);
}

setInterval(createLetter, 500);
</script>
<div class="clovers">
    <span>🍀</span>
    <span>🍀</span>
    <span>🍀</span>
    <span>🍀</span>
    <span>🍀</span>
    <span>🍀</span>
</div>
</body>
</html>
